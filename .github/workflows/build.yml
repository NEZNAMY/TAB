name: Build
on:
  push:
    branches:
      - master
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6 # https://github.com/actions/checkout/releases
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 25
        uses: actions/setup-java@v5 # https://github.com/actions/setup-java/releases
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Cache Gradle
        uses: actions/cache@v6 # https://github.com/actions/cache/releases
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
        run: ./gradlew clean build
      - name: Rename JAR with Build Number
        run: |
          find jar/build/libs -type f -name "TAB v*.jar" -print0 | while IFS= read -r -d '' original; do
            dir=$(dirname "$original")
            base=$(basename "$original")
            new_base="${base%.jar}+${{ github.run_number }}.jar"
            new_path="$dir/$new_base"
            mv "$original" "$new_path"
          done
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7 # https://github.com/actions/upload-artifact/releases
        with:
          name: Click here to download
          path: "jar/build/libs/TAB v*+${{ github.run_number }}.jar"
